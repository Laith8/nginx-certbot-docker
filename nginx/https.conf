server_tokens off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        add_header Cache-Control "no-store" always;
        return 307 https://$host$request_uri;
    }
}
